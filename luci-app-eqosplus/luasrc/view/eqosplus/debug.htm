<div style="margin-top:10px">
    <strong><%:Log Output%></strong><br/>
    <textarea id="eqosplus_log" rows="12" style="width:100%;font-family:monospace;font-size:12px;padding:8px" readonly><%:Waiting for log data...%></textarea>
</div>
<div style="margin-top:15px">
    <strong><%:Diagnostics%></strong>
    <input type="button" id="btn_diag" value="<%:Run Diagnostics%>" onclick="runDiag()" class="cbi-button cbi-button-apply" style="margin-left:10px" /><br/>
    <textarea id="eqosplus_diag_output" rows="10" style="width:100%;font-family:monospace;font-size:12px;margin-top:5px;padding:8px" readonly></textarea>
</div>
<div style="margin-top:15px">
    <strong><%:Tests%></strong>
    <input type="button" id="btn_test" data-label="<%:Structure Test%>" value="<%:Structure Test%>" onclick="runTest()" class="cbi-button cbi-button-apply" style="margin-left:10px" />
    <input type="button" id="btn_traffic_test" data-label="<%:Traffic Test%>" value="<%:Traffic Test%>" onclick="runTrafficTest()" class="cbi-button cbi-button-apply" style="margin-left:5px" /><br/>
    <textarea id="eqosplus_test_output" rows="18" style="width:100%;font-family:monospace;font-size:12px;margin-top:5px;padding:8px" readonly></textarea>
</div>
