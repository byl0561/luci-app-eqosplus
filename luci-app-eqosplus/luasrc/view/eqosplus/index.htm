<% include("cbi/map") %>
<style>
[id^="cbi-eqosplus-network_"] { display: none; }
[id^="cbi-eqosplus-network_"].eqos-zone-visible { display: block !important; }
/* Fixed table layout: column widths based on data content, not header/dropdown text */
[id^="cbi-eqosplus-network_"] .cbi-section-table { table-layout: fixed; width: 100%; }
[id^="cbi-eqosplus-network_"] .cbi-section-table .placeholder td,
[id^="cbi-eqosplus-network_"] .cbi-section-table .tr.placeholder .td { text-align: center; width: auto !important; }
[id^="cbi-eqosplus-network_"] .cbi-section-table th:nth-child(1),
[id^="cbi-eqosplus-network_"] .cbi-section-table td:nth-child(1)  { width: 4%; }   /* Enabled */
[id^="cbi-eqosplus-network_"] .cbi-section-table th:nth-child(2),
[id^="cbi-eqosplus-network_"] .cbi-section-table td:nth-child(2)  { width: 14%; }  /* IP/MAC */
[id^="cbi-eqosplus-network_"] .cbi-section-table th:nth-child(3),
[id^="cbi-eqosplus-network_"] .cbi-section-table td:nth-child(3)  { width: 7%; }   /* Download */
[id^="cbi-eqosplus-network_"] .cbi-section-table th:nth-child(4),
[id^="cbi-eqosplus-network_"] .cbi-section-table td:nth-child(4)  { width: 7%; }   /* Upload */
[id^="cbi-eqosplus-network_"] .cbi-section-table th:nth-child(5),
[id^="cbi-eqosplus-network_"] .cbi-section-table td:nth-child(5)  { width: 6%; }   /* Conn In */
[id^="cbi-eqosplus-network_"] .cbi-section-table th:nth-child(6),
[id^="cbi-eqosplus-network_"] .cbi-section-table td:nth-child(6)  { width: 6%; }   /* Conn Out */
[id^="cbi-eqosplus-network_"] .cbi-section-table th:nth-child(7),
[id^="cbi-eqosplus-network_"] .cbi-section-table td:nth-child(7)  { width: 5%; }   /* TCP only */
[id^="cbi-eqosplus-network_"] .cbi-section-table th:nth-child(8),
[id^="cbi-eqosplus-network_"] .cbi-section-table td:nth-child(8)  { width: 7%; }   /* Start */
[id^="cbi-eqosplus-network_"] .cbi-section-table th:nth-child(9),
[id^="cbi-eqosplus-network_"] .cbi-section-table td:nth-child(9)  { width: 7%; }   /* End */
[id^="cbi-eqosplus-network_"] .cbi-section-table th:nth-child(10),
[id^="cbi-eqosplus-network_"] .cbi-section-table td:nth-child(10) { width: 11%; }  /* Schedule */
[id^="cbi-eqosplus-network_"] .cbi-section-table th:nth-child(11),
[id^="cbi-eqosplus-network_"] .cbi-section-table td:nth-child(11) { width: 12%; }  /* Comment */
[id^="cbi-eqosplus-network_"] .cbi-section-table th:nth-child(12),
[id^="cbi-eqosplus-network_"] .cbi-section-table td:nth-child(12) { width: 14%; }  /* Actions */
/* All form elements fill their cell */
[id^="cbi-eqosplus-network_"] .cbi-section-table select,
[id^="cbi-eqosplus-network_"] .cbi-section-table input[type="text"] {
	width: 100%; max-width: 100%; min-width: 0; box-sizing: border-box;
	overflow: hidden; text-overflow: ellipsis;
}
/* LuCI custom dropdown widget (cbi-dropdown): constrain to cell width.
   Do NOT set overflow:hidden — it blocks the dropdown from expanding. */
[id^="cbi-eqosplus-network_"] .cbi-section-table .cbi-dropdown {
	max-width: 100% !important; min-width: 0 !important;
}
/* In table context: allow shrinking below cbi-dropdown min-width */
[id^="cbi-eqosplus-network_"] .eqos-multiselect { min-width: 0; }
[id^="cbi-eqosplus-network_"] .eqos-multiselect-item label { cursor: pointer; }
/* eqos-multiselect: extends native cbi-dropdown with open/close toggle.
   Always used with .cbi-dropdown class (see JS wrapper.className). */
.eqos-multiselect { position: relative; display: block !important; width: 100%; box-sizing: border-box; cursor: pointer; }
.eqos-multiselect-toggle {
	display: block; width: 100%; box-sizing: border-box;
	padding: 5px 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
	border: none; background: transparent; line-height: 1.4;
}
/* In table context: restore table sizing */
[id^="cbi-eqosplus-network_"] .eqos-multiselect-toggle {
	font-size: 12px; padding: 4px 6px;
}
.eqos-multiselect-toggle::after { content: " \25BE"; opacity: 0.5; }
/* Dropdown panel: themed via three-tier fallback so we look right on:
   1. LuCI native themes (bootstrap, material) — use --background-color-low etc.
   2. argon — falls back to argon's own --primary / --menu-bg-color etc.
   3. Anything else without theme vars — uses hardcoded sane defaults
   The bug being fixed: themes that don't define LuCI's standard vars
   (e.g. argon doesn't) made the panel TRANSPARENT under the original code.
   Border/box-shadow stay hardcoded #918e8c — that matches LuCI native. */
.eqos-multiselect-dropdown {
	display: none; position: absolute; z-index: 1100; left: 0; top: 100%;
	background: var(--background-color-low, var(--menu-bg-color, #ffffff));
	color: var(--text-color-high, var(--main-menu-color, #1a1a1a));
	border: 1px solid #918e8c;
	box-shadow: 0 0 4px #918e8c;
	min-width: 100%; white-space: nowrap;
}
.eqos-multiselect-item {
	display: flex; align-items: center; gap: 6px;
	padding: 5px 8px; cursor: pointer;
	color: var(--text-color-high, var(--main-menu-color, #1a1a1a));
}
/* Item states: same vars as native cbi-dropdown[open] > ul.dropdown > li,
   with argon's --primary as second-tier fallback for selection accent. */
.eqos-multiselect-item:hover {
	background: var(--primary-color-low, #e8f0fe);
	color: var(--on-primary-color, #174ea6);
}
.eqos-multiselect-item:has(input:checked) {
	background: var(--primary-color-medium, var(--primary, #1976d2));
	color: var(--on-primary-color, #ffffff);
}
.eqos-multiselect-item:has(input:checked):hover {
	background: linear-gradient(90deg,
		var(--primary-color-medium, var(--primary, #1976d2)) 50%,
		var(--primary-color-low, #e8f0fe));
}
.eqos-multiselect-item input[type="checkbox"] { margin: 0; }
/* Force label/span text inside items to inherit our item color so themes
   that style .cbi-checkbox label can't make selected items unreadable. */
.eqos-multiselect-item label,
.eqos-multiselect-item span,
.eqos-multiselect-item .cbi-checkbox { color: inherit; background: transparent; }

/* Dark-mode fallback palette — kicks in for themes that don't define LuCI's
   CSS vars but DO follow `prefers-color-scheme`. Notably argon (mode=normal):
   argon's header.ut wraps its dark.css in `@media (prefers-color-scheme: dark)`
   for normal mode, and simply emits it for forced-dark mode. Either path turns
   the page background dark; without this block our white panel would be
   jarringly bright on top.
   Colors below match argon dark's palette (#252526 bg, #cccccc text,
   #483d8b == --dark-primary for selection) so the dropdown blends in. */
@media (prefers-color-scheme: dark) {
	.eqos-multiselect-dropdown {
		/* argon dark.css uses #252526 / #ffffff / #3c3c3c; we mirror those.
		   When a theme defines --background-color-low etc., it still wins. */
		background: var(--background-color-low, #252526);
		color: var(--text-color-high, #cccccc);
		border-color: #3c3c3c;
		box-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
	}
	.eqos-multiselect-item {
		color: var(--text-color-high, #cccccc);
	}
	.eqos-multiselect-item:hover {
		/* #3a3050 = argon --dark-primary (#483d8b) toned ~25% darker for hover */
		background: var(--primary-color-low, #3a3050);
		color: var(--on-primary-color, #ffffff);
	}
	.eqos-multiselect-item:has(input:checked) {
		/* argon's --dark-primary is exactly #483d8b — selection blends in */
		background: var(--primary-color-medium, var(--dark-primary, #483d8b));
		color: var(--on-primary-color, #ffffff);
	}
	.eqos-multiselect-item:has(input:checked):hover {
		background: linear-gradient(90deg,
			var(--primary-color-medium, var(--dark-primary, #483d8b)) 50%,
			var(--primary-color-low, #3a3050));
	}
}
/* Use [open] attribute to match native cbi-dropdown focus/glow */
.eqos-multiselect[open] .eqos-multiselect-dropdown { display: block; }
</style>
<script type="text/javascript">//<![CDATA[
	// Log poll controls — assigned inside tab IIFE, used by visibilitychange handler
	var startLogPoll, stopLogPoll;

	// --- Server-side data injection (immune to JS timing issues) ---
	<%
		local json = require("luci.jsonc")
		local uci_t = require("luci.model.uci").cursor()
	%>
	// Zone -> network mapping (from firewall config)
	var eqosZoneMap = <%
		local zmap = {}
		uci_t:foreach("firewall", "zone", function(z)
			if z.name and z.name ~= "wan" then
				local nets = z.network or {}
				if type(nets) == "string" then nets = {nets} end
				zmap[z.name] = nets
			end
		end)
		write(json.stringify(zmap))
	%>;
	// UCI week values per section (keyed by section name, e.g. "cfg012345")
	// Used to restore schedule checkbox states reliably, bypassing DOM timing.
	var _uciWeekData = <%
		local wdata = {}
		uci_t:foreach("eqosplus", nil, function(s)
			if s[".type"] and s[".type"]:match("^network_") then
				local w = s.week
				if not w or w == "" or w == "0" then
					w = "1,2,3,4,5,6,7"
				end
				wdata[s[".name"]] = w
			end
		end)
		write(json.stringify(wdata))
	%>;

	// --- Dynamic zone visibility + checkbox dropdown panel ---
	// CBI form is rendered client-side by LuCI JS; checkboxes may not exist
	// at DOMContentLoaded. Use MutationObserver to wait for them.
	(function() {
		var _done = false;
		function initZoneDropdown() {
			if (_done) return;
			var cbs = document.querySelectorAll('input[type="checkbox"][name$=".enabled_zones"]');
			if (!cbs.length) return;
			_done = true;

			// --- Build dropdown panel ---
			var field = cbs[0].closest('.cbi-value-field') || cbs[0].parentNode;
			var container = cbs[0].closest('[data-idref]') || field;

			// Hide all original content (checkboxes, br, text nodes) to prevent
			// blank space above the dropdown; keep in DOM for form submission
			var origChildren = [];
			while (container.firstChild) origChildren.push(container.removeChild(container.firstChild));
			var hidden = document.createElement('div');
			hidden.style.display = 'none';
			for (var i = 0; i < origChildren.length; i++) hidden.appendChild(origChildren[i]);
			container.appendChild(hidden);

			var wrapper = document.createElement('div');
			wrapper.className = 'cbi-dropdown eqos-multiselect';
			var toggle = document.createElement('div');
			toggle.className = 'eqos-multiselect-toggle';
			var dropdown = document.createElement('div');
			dropdown.className = 'eqos-multiselect-dropdown';

			// Move .cbi-checkbox spans from hidden container into dropdown items
			var cbSpans = hidden.querySelectorAll('.cbi-checkbox');
			for (var i = 0; i < cbSpans.length; i++) {
				var item = document.createElement('div');
				item.className = 'eqos-multiselect-item';
				item.appendChild(cbSpans[i]);
				dropdown.appendChild(item);
			}

			wrapper.appendChild(toggle);
			wrapper.appendChild(dropdown);
			container.appendChild(wrapper);

			// Toggle open/close (use [open] attribute for native cbi-dropdown glow)
			toggle.addEventListener('click', function() {
				wrapper.toggleAttribute('open');
			});
			document.addEventListener('click', function(ev) {
				if (!wrapper.contains(ev.target)) {
					wrapper.removeAttribute('open');
				}
			});

			// --- Helper: get display text for a checkbox ---
			function getCheckboxText(cb) {
				var parent = cb.closest('.cbi-checkbox');
				if (parent) {
					var s = parent.querySelector('span');
					if (s) return s.textContent.trim();
				}
				return cb.value;
			}

			// --- Zone visibility sync ---
			function updateToggleText() {
				var names = [];
				for (var i = 0; i < cbs.length; i++) {
					if (cbs[i].checked) names.push(getCheckboxText(cbs[i]));
				}
				toggle.textContent = names.length ? names.join(', ') : '<%=translate("-- Please choose --")%>';
			}

			function syncVisibility() {
				var selected = {};
				for (var i = 0; i < cbs.length; i++) {
					if (cbs[i].checked) selected[cbs[i].value] = true;
				}
				for (var zone in eqosZoneMap) {
					var nets = eqosZoneMap[zone];
					for (var j = 0; j < nets.length; j++) {
						var sec = document.getElementById('cbi-eqosplus-network_' + nets[j]);
						if (sec) {
							if (selected[zone]) {
								sec.classList.add('eqos-zone-visible');
							} else {
								sec.classList.remove('eqos-zone-visible');
							}
						}
					}
				}
			}

			for (var i = 0; i < cbs.length; i++) {
				cbs[i].addEventListener('change', function() {
					updateToggleText();
					syncVisibility();
				});
			}
			updateToggleText();
			syncVisibility();
		}

		// Try immediately, then watch for CBI to render the checkboxes
		initZoneDropdown();
		if (!_done) {
			var map = document.querySelector('.cbi-map');
			if (map) {
				var _timer = null;
				var _obs = new MutationObserver(function() {
					if (_timer) clearTimeout(_timer);
					_timer = setTimeout(function() {
						initZoneDropdown();
						if (_done) _obs.disconnect();
					}, 100);
				});
				_obs.observe(map, { childList: true, subtree: true });
			}
		}
	})();
	// --- Schedule multi-select dropdown (per table row) ---
	// Transforms inline MultiValue checkboxes into compact dropdown widgets
	// (same eqos-multiselect pattern as the zone selector).
	(function() {
		var dayLabels = {
			'1':'<%=translate("Mon")%>','2':'<%=translate("Tue")%>','3':'<%=translate("Wed")%>',
			'4':'<%=translate("Thu")%>','5':'<%=translate("Fri")%>','6':'<%=translate("Sat")%>','7':'<%=translate("Sun")%>'
		};
		function buildDropdown(td) {
			if (td.querySelector('.eqos-multiselect')) return; // already done
			var cbs = td.querySelectorAll('input[type="checkbox"]');
			if (!cbs.length) return;
			var spans = td.querySelectorAll('.cbi-checkbox');
			if (!spans.length) return;
			// Hide all original td content (checkboxes, br tags, text nodes,
			// and any LuCI cbi-dropdown widget) to eliminate blank lines;
			// keep nodes in DOM for form submission.
			var origChildren = [];
			while (td.firstChild) origChildren.push(td.removeChild(td.firstChild));
			var hidden = document.createElement('div');
			hidden.style.display = 'none';
			for (var i = 0; i < origChildren.length; i++) hidden.appendChild(origChildren[i]);
			td.appendChild(hidden);
			// Re-query checkboxes from hidden container
			cbs = hidden.querySelectorAll('input[type="checkbox"]');
			spans = hidden.querySelectorAll('.cbi-checkbox');
			// Build dropdown widget
			var wrapper = document.createElement('div');
			wrapper.className = 'cbi-dropdown eqos-multiselect';
			var toggle = document.createElement('div');
			toggle.className = 'eqos-multiselect-toggle';
			var dropdown = document.createElement('div');
			dropdown.className = 'eqos-multiselect-dropdown';
			for (var i = 0; i < spans.length; i++) {
				var item = document.createElement('div');
				item.className = 'eqos-multiselect-item';
				item.appendChild(spans[i]);
				dropdown.appendChild(item);
			}
			function updateText() {
				var days = [];
				for (var i = 0; i < cbs.length; i++) {
					if (cbs[i].checked) days.push(parseInt(cbs[i].value));
				}
				if (days.length === 0) { toggle.textContent = '<%=translate("-- Please choose --")%>'; return; }
				days.sort(function(a,b){return a-b});
				var ranges = [], s = days[0], e = days[0];
				for (var i = 1; i < days.length; i++) {
					if (days[i] === e + 1) { e = days[i]; }
					else { ranges.push([s, e]); s = e = days[i]; }
				}
				ranges.push([s, e]);
				var parts = [];
				for (var i = 0; i < ranges.length; i++) {
					var r = ranges[i];
					parts.push(r[0] === r[1] ? dayLabels[String(r[0])] : dayLabels[String(r[0])] + '~' + dayLabels[String(r[1])]);
				}
				toggle.textContent = parts.join(' ');
			}
			for (var i = 0; i < cbs.length; i++) {
				cbs[i].addEventListener('change', updateText);
			}
			toggle.addEventListener('click', function() { wrapper.toggleAttribute('open'); });
			wrapper.appendChild(toggle);
			wrapper.appendChild(dropdown);
			td.appendChild(wrapper);
			// Restore checkbox states from server-injected UCI data (immune to
			// LuCI Dropdown JS timing that can clear/reset .checked properties).
			// Extract section name from checkbox name: "cbid.eqosplus.<section>.week"
			var cbName = cbs.length > 0 ? cbs[0].name : '';
			var section = cbName.replace(/^cbid\.eqosplus\./, '').replace(/\.week$/, '');
			var uciWeek = _uciWeekData[section];
			if (uciWeek) {
				var vals = uciWeek.split(',');
				var valSet = {};
				for (var v = 0; v < vals.length; v++) valSet[vals[v]] = true;
				for (var i = 0; i < cbs.length; i++) {
					cbs[i].checked = !!valSet[cbs[i].value];
				}
			} else {
				// New row (no UCI data yet): auto-select all days
				for (var i = 0; i < cbs.length; i++) cbs[i].checked = true;
			}
			updateText();
		}
		function fixPlaceholders() {
			var tables = document.querySelectorAll(
				'[id^="cbi-eqosplus-network_"] .cbi-section-table'
			);
			for (var i = 0; i < tables.length; i++) {
				// Detect placeholder via class or via <em> inside a single-cell row
				var placeholder = tables[i].querySelector('.placeholder')
					|| tables[i].querySelector('tr > td[colspan] > em, .tr > .td > em');
				var placeholderRow = placeholder
					? (placeholder.closest('.placeholder') || placeholder.closest('tr, .tr'))
					: null;
				if (placeholderRow) {
					// Switch to auto layout so colspan can span full width
					tables[i].style.tableLayout = 'auto';
					var td = placeholderRow.querySelector('td, .td');
					if (td) td.setAttribute('colspan', '12');
				} else {
					// Data rows exist; clear override so CSS fixed layout applies
					tables[i].style.tableLayout = '';
				}
			}
		}
		function initScheduleDropdowns() {
			fixPlaceholders();
			// Schedule is column 10 (nth-child(10)) — after Conn In + Conn Out + TCP only
			var tds = document.querySelectorAll('[id^="cbi-eqosplus-network_"] .cbi-section-table td:nth-child(10)');
			for (var i = 0; i < tds.length; i++) buildDropdown(tds[i]);
		}
		initScheduleDropdowns();
		// Re-run after full page load to catch late-rendered tables
		window.addEventListener('load', function() {
			setTimeout(initScheduleDropdowns, 200);
		});
		var map = document.querySelector('.cbi-map');
		if (map) {
			var _timer = null;
			var _obs = new MutationObserver(function() {
				if (_timer) clearTimeout(_timer);
				_timer = setTimeout(initScheduleDropdowns, 150);
			});
			_obs.observe(map, { childList: true, subtree: true });
		}
		// Close any open schedule dropdown when clicking outside
		document.addEventListener('click', function(ev) {
			var drops = document.querySelectorAll('[id^="cbi-eqosplus-network_"] .eqos-multiselect[open]');
			for (var i = 0; i < drops.length; i++) {
				if (!drops[i].contains(ev.target)) drops[i].removeAttribute('open');
			}
		});
	})();
	// --- MAC identifiers do not support connection limits ---
	// When the target dropdown is a MAC address, force conn_in / conn_out
	// to "0" and disable the inputs so the user can't type a non-zero value.
	// Server-side validate (cbi/eqosplus.lua ip.validate) rejects MAC + non-zero
	// conn_in/out as a defense in depth in case this JS is bypassed.
	(function() {
		var MAC_RE = /^[0-9a-fA-F]{2}([:\-][0-9a-fA-F]{2}){5}$/;

		function readTargetValue(row) {
			// Try cbi-dropdown widget first (the common rendering for Value
			// with .value() options): selected <li> holds data-value, or a
			// custom-input <li> nests an <input> for free-form entries.
			var dd = row.querySelector('.cbi-dropdown[data-name$=".target"]');
			if (dd) {
				var sel = dd.querySelector('li[selected]');
				if (sel) {
					var v = sel.getAttribute('data-value');
					if (v && v !== '-' && v !== '') return v;
					var inp = sel.querySelector('input');
					if (inp && inp.value) return inp.value;
				}
				var dv = dd.getAttribute('data-value');
				if (dv) return dv;
			}
			// Fallback for plain <input> rendering (older LuCI builds).
			var plain = row.querySelector('input[name$=".target"]');
			return plain ? plain.value : '';
		}

		function findConnInputs(row) {
			// Numeric inputs (conn_in / conn_out) — text type, readOnly works.
			return [
				row.querySelector('input[name$=".conn_in"]'),
				row.querySelector('input[name$=".conn_out"]')
			].filter(Boolean);
		}
		function findTcpOnlyInput(row) {
			// LuCI Flag → <input type="checkbox">. readOnly is ignored on
			// checkboxes by the browser, so we use pointer-events + tabIndex
			// to lock interaction. Form submission of value=1 is preserved
			// (we force checked=true when MAC is selected), so the saved
			// state is always the default.
			return row.querySelector('input[type="checkbox"][name$=".tcp_only"]');
		}

		function syncRow(row) {
			var connInputs = findConnInputs(row);
			var tcpOnly = findTcpOnlyInput(row);
			if (!connInputs.length && !tcpOnly) return;
			var isMac = MAC_RE.test(readTargetValue(row));
			var msg = '<%=translate("MAC identifiers do not support connection limits")%>';

			// Numeric conn inputs — readOnly + force "0" to clear stale UCI values.
			// Disabled inputs are EXCLUDED from form submission per HTML spec,
			// so write hook would never receive "0" and old CI/CO values would
			// silently survive. readOnly keeps them submitted.
			connInputs.forEach(function(inp) {
				if (isMac) {
					if (inp.value !== '0') inp.value = '0';
					inp.readOnly = true;
					inp.title = msg;
					inp.style.opacity = '0.5';
					inp.style.cursor = 'not-allowed';
					inp.style.background = '#f0f0f0';
				} else {
					inp.readOnly = false;
					inp.title = '';
					inp.style.opacity = '';
					inp.style.cursor = '';
					inp.style.background = '';
				}
			});

			// tcp_only checkbox — force to default ("1" = checked) and lock.
			// Why not `disabled`: HTML excludes disabled inputs from form
			// submission, but LuCI Flag emits a hidden fallback `<input
			// type="hidden" value="0">` alongside the checkbox. With the
			// checkbox disabled, only the hidden submits → UCI ends up
			// with tcp_only=0 every time the user saves a MAC row, even
			// though it's "irrelevant" for MAC. That dirties the data.
			// pointer-events:none + force checked=true gives:
			//   - checkbox visually checked + greyed
			//   - checkbox value=1 still submits (wins over hidden value=0)
			//   - UCI gets tcp_only=1 (matches default), consistent state
			if (tcpOnly) {
				if (isMac) {
					if (!tcpOnly.checked) tcpOnly.checked = true;  // lock to default
					tcpOnly.style.pointerEvents = 'none';
					tcpOnly.style.opacity = '0.5';
					tcpOnly.style.cursor = 'not-allowed';
					tcpOnly.title = msg;
					tcpOnly.tabIndex = -1;
				} else {
					tcpOnly.style.pointerEvents = '';
					tcpOnly.style.opacity = '';
					tcpOnly.style.cursor = '';
					tcpOnly.title = '';
					tcpOnly.tabIndex = 0;
				}
			}
		}

		function syncAll() {
			var rows = document.querySelectorAll(
				'[id^="cbi-eqosplus-network_"] .cbi-section-table tr, ' +
				'[id^="cbi-eqosplus-network_"] .cbi-section-table .tr');
			for (var i = 0; i < rows.length; i++) syncRow(rows[i]);
		}

		var map = document.querySelector('.cbi-map');
		if (!map) return;

		// Initial sync — must wait for CBI to render. Run multiple times to
		// catch late renders.
		syncAll();
		window.addEventListener('load', function() { setTimeout(syncAll, 200); });

		// Re-evaluate on any cbi-dropdown selection change. Delegated listener
		// covers all rows; we filter to target-field events at the handler.
		map.addEventListener('click', function(ev) {
			// User picked an option in a dropdown
			var li = ev.target.closest && ev.target.closest('li[data-value]');
			if (!li) return;
			var dd = li.closest('.cbi-dropdown[data-name$=".target"]');
			if (!dd) return;
			// LuCI updates `selected` asynchronously after click; defer.
			setTimeout(function() {
				var row = dd.closest('tr, .tr');
				if (row) syncRow(row);
			}, 0);
		}, true);
		map.addEventListener('input', function(ev) {
			// User typed in the custom-input field of the target dropdown
			if (!ev.target.matches('input')) return;
			var dd = ev.target.closest('.cbi-dropdown[data-name$=".target"]');
			if (!dd) return;
			var row = dd.closest('tr, .tr');
			if (row) syncRow(row);
		}, true);

		// Catch DOM rebuilds (LuCI re-renders sections after Add/Remove).
		var _t = null;
		new MutationObserver(function() {
			if (_t) clearTimeout(_t);
			_t = setTimeout(syncAll, 100);
		}).observe(map, { childList: true, subtree: true });
	})();
	// --- Tab setup ---
	(function() {
		var map = document.querySelector('.cbi-map');
		if (!map) return;

		// Collect all cbi-section elements (direct children of map)
		var allSections = [];
		var children = map.childNodes;
		for (var i = 0; i < children.length; i++) {
			if (children[i].nodeType === 1 && (
				children[i].className || '').indexOf('cbi-section') !== -1) {
				allSections.push(children[i]);
			}
		}
		if (allSections.length < 2) return;

		// sections[0] = Status + Enabled (always visible)
		// sections[1..n-2] = network config (Configuration tab)
		// sections[n-1] = Debug tab
		var headerSection = allSections[0];
		var debugSection = allSections[allSections.length - 1];
		var configSections = [];
		for (var i = 1; i < allSections.length - 1; i++) {
			configSections.push(allSections[i]);
		}

		// Create tab bar
		var tabMenu = document.createElement('ul');
		tabMenu.className = 'cbi-tabmenu';
		tabMenu.innerHTML =
			'<li class="cbi-tab" id="eqos-tab-config"><a href="javascript:void(0)"><%=translate("Configuration")%></a></li>' +
			'<li class="cbi-tab-disabled" id="eqos-tab-debug"><a href="javascript:void(0)"><%=translate("Debug")%></a></li>';
		headerSection.parentNode.insertBefore(tabMenu, headerSection.nextSibling);

		// Config container
		var configDiv = document.createElement('div');
		configDiv.id = 'eqos-content-config';
		tabMenu.parentNode.insertBefore(configDiv, tabMenu.nextSibling);
		for (var i = 0; i < configSections.length; i++) {
			configDiv.appendChild(configSections[i]);
		}

		// Debug container (hidden by default)
		var debugDiv = document.createElement('div');
		debugDiv.id = 'eqos-content-debug';
		debugDiv.style.display = 'none';
		configDiv.parentNode.insertBefore(debugDiv, configDiv.nextSibling);
		debugDiv.appendChild(debugSection);

		// Tab switching
		function switchTab(tab) {
			document.getElementById('eqos-tab-config').className =
				(tab === 'config') ? 'cbi-tab' : 'cbi-tab-disabled';
			document.getElementById('eqos-tab-debug').className =
				(tab === 'debug') ? 'cbi-tab' : 'cbi-tab-disabled';
			document.getElementById('eqos-content-config').style.display =
				(tab === 'config') ? '' : 'none';
			document.getElementById('eqos-content-debug').style.display =
				(tab === 'debug') ? '' : 'none';
		}

		// Log polling state: only poll when Debug tab is active.
		// startLogPoll/stopLogPoll are assigned to outer-scope vars so the
		// visibilitychange handler (outside this IIFE) can access them.
		var logPollActive = false;
		var logPollFn = null;
		startLogPoll = function() {
			if (logPollActive) return;
			logPollActive = true;
			logPollFn = function (x, result) {
				var el = document.getElementById('eqosplus_log');
				if (el && result && result.log != null) {
					el.value = result.log;
					el.scrollTop = el.scrollHeight;
				}
			};
			XHR.poll(5, '<%=luci.dispatcher.build_url("admin", "network", "eqosplus", "get_log")%>', null, logPollFn);
		};
		stopLogPoll = function() {
			if (!logPollActive) return;
			logPollActive = false;
			if (logPollFn) {
				XHR.stop(logPollFn);
				logPollFn = null;
			}
		};

		document.getElementById('eqos-tab-config').onclick = function() { switchTab('config'); stopLogPoll(); };
		document.getElementById('eqos-tab-debug').onclick = function() { switchTab('debug'); startLogPoll(); };
	})();

	// --- Status polling ---
	var statusPollFn = function (x, result) {
		var status = document.getElementsByClassName('eqosplus_status')[0];
		if (!status || !result) return;
		status.setAttribute("style", "font-weight:bold;");
		if (result.warning === "turboacc") {
			status.style.color = "orange";
			status.textContent = '<%=translate("NOT RUNNING")%> - <%=translate("turboacc flow offloading conflict, please disable sw_flow/sfe_flow")%>';
		} else {
			status.style.color = result.status ? "green" : "red";
			status.textContent = result.status ? '<%=translate("RUNNING")%>' : '<%=translate("NOT RUNNING")%>';
		}
	};
	var statusPollUrl = '<%=luci.dispatcher.build_url("admin", "network", "eqosplus", "status")%>';
	var statusPollActive = false;
	// Shared helper: start status poll only if not already active (prevents
	// duplicate pollers on repeated visibilitychange cycles — P4 fix).
	function startStatusPoll() {
		if (statusPollActive) return;
		statusPollActive = true;
		XHR.poll(5, statusPollUrl, null, statusPollFn);
	}
	function stopStatusPoll() {
		if (!statusPollActive) return;
		statusPollActive = false;
		XHR.stop(statusPollFn);
	}
	startStatusPoll();

	// Pause all polling when page/tab is hidden to save router resources
	document.addEventListener('visibilitychange', function() {
		if (document.hidden) {
			stopStatusPoll();
			stopLogPoll();
		} else {
			startStatusPoll();
			if (document.getElementById('eqos-tab-debug').className === 'cbi-tab') {
				startLogPoll();
			}
		}
	});

	// --- Run diagnostics ---
	function runDiag() {
		var btn = document.getElementById('btn_diag');
		var out = document.getElementById('eqosplus_diag_output');
		if (!btn || !out) return;
		btn.disabled = true;
		out.value = '<%=translate("Running...")%>';
		XHR.get('<%=luci.dispatcher.build_url("admin", "network", "eqosplus", "diag")%>', null,
			function(x, r) {
				out.value = (r && r.output) || '<%=translate("No output")%>';
				btn.disabled = false;
			}
		);
	}

	// --- Test execution helpers ---
	// Global mutex: prevents concurrent opkg/test operations that could
	// corrupt the package database (P6 fix).
	var _testBtnIds = ['btn_test', 'btn_traffic_test'];
	var _testRunning = false;
	function _setAllTestBtns(disabled) {
		for (var i = 0; i < _testBtnIds.length; i++) {
			var b = document.getElementById(_testBtnIds[i]);
			if (b) b.disabled = disabled;
		}
	}
	function _testDone(btn, out, origLabel, result) {
		out.value = (result && result.output) || '<%=translate("No output")%>';
		// Auto-scroll to the bottom so the final summary block (`Total: ...
		// Pass: ... Fail: ...`) is in view — both test scripts call test_report
		// at the very end and that's what users want to see first.
		out.scrollTop = out.scrollHeight;
		btn.value = origLabel;
		_testRunning = false;
		_setAllTestBtns(false);
	}

	// Module-level poll state. Switching from one test to another (e.g. user
	// runs Structure Test then immediately Traffic Test) requires forcibly
	// stopping the previous poll — otherwise BOTH pollers race and two
	// different log files alternate-flicker into the same textarea, and the
	// stale poll's _testDone calls keep flipping buttons back to "enabled"
	// while the new test is still running.
	var _testActivePoll = null;
	var _testGen = 0;

	function _stopActivePoll() {
		if (_testActivePoll) {
			try { XHR.stop(_testActivePoll); } catch (e) {}
			_testActivePoll = null;
		}
	}

	function doRunTest(btn, out, origLabel, testUrl) {
		// Async pattern: start the test, then poll every 1s for progress.
		// The backend writes test output to a tmp log; each poll returns the
		// log so far + a "running" flag. uhttpd never sees a long request,
		// so script_timeout (default 60s) doesn't cut us off mid-test.
		_stopActivePoll();
		var thisGen = ++_testGen;

		btn.value = '<%=translate("Running...")%>';
		out.value = '<%=translate("Running tests, please wait...")%>';
		var firstResp = true;
		var pollFn = function(x, r) {
			// Generation guard: an in-flight poll from an earlier test run
			// would have a stale `thisGen` and silently bail out. Belt-and-
			// suspenders against any edge case where XHR.stop didn't take.
			if (thisGen !== _testGen) return;
			if (r) {
				if (r.output != null) {
					out.value = r.output;
					out.scrollTop = out.scrollHeight;
				}
				if (!r.running && !firstResp) {
					try { XHR.stop(pollFn); } catch (e) {}
					if (_testActivePoll === pollFn) _testActivePoll = null;
					_testDone(btn, out, origLabel, r);
				}
				firstResp = false;
			}
		};
		// Kick off the test (action=start), then start polling.
		XHR.get(testUrl + '?action=start', null, function(x, r) {
			if (thisGen !== _testGen) return;  // user already started another
			pollFn(x, r);
			_testActivePoll = pollFn;
			XHR.poll(1, testUrl, null, pollFn);
		});
	}

	// --- Generic: check single dep -> install if needed -> run test ---
	function runTestWithDep(btnId, depPkg, testUrl) {
		if (_testRunning) return;
		var btn = document.getElementById(btnId);
		var out = document.getElementById('eqosplus_test_output');
		if (!btn || !out) return;
		_testRunning = true;
		_setAllTestBtns(true);
		var origLabel = btn.getAttribute('data-label');
		btn.value = '<%=translate("Checking...")%>';
		out.value = '';

		var checkUrl = '<%=luci.dispatcher.build_url("admin", "network", "eqosplus", "check_dep")%>?pkg=' + encodeURIComponent(depPkg);
		var installUrl = '<%=luci.dispatcher.build_url("admin", "network", "eqosplus", "install_dep")%>?pkg=' + encodeURIComponent(depPkg);

		XHR.get(checkUrl, null, function(x, r) {
			if (r && !r.installed) {
				if (!confirm(depPkg + ' <%=translate("is not installed. Install now?")%>')) {
					btn.value = origLabel;
					_testRunning = false;
					_setAllTestBtns(false);
					return;
				}
				btn.value = '<%=translate("Installing...")%>';
				out.value = '<%=translate("Updating package list and installing")%> ' + depPkg + '...';
				XHR.get(installUrl, null, function(x, r2) {
					if (!r2 || !r2.success) {
						out.value = (r2 && r2.output) || '<%=translate("Install failed")%>';
						btn.value = origLabel;
						_testRunning = false;
						_setAllTestBtns(false);
						return;
					}
					doRunTest(btn, out, origLabel, testUrl);
				});
			} else {
				doRunTest(btn, out, origLabel, testUrl);
			}
		});
	}

	// --- Check multiple deps -> install missing -> run test ---
	function runTestWithDeps(btnId, depPkgs, testUrl) {
		if (_testRunning) return;
		var btn = document.getElementById(btnId);
		var out = document.getElementById('eqosplus_test_output');
		if (!btn || !out) return;
		_testRunning = true;
		_setAllTestBtns(true);
		var origLabel = btn.getAttribute('data-label');
		btn.value = '<%=translate("Checking...")%>';
		out.value = '';

		var checkUrl = '<%=luci.dispatcher.build_url("admin", "network", "eqosplus", "check_deps")%>?pkgs=' + encodeURIComponent(depPkgs);

		XHR.get(checkUrl, null, function(x, r) {
			if (r && r.missing && r.missing.length > 0) {
				var pkgList = r.missing.join(', ');
				if (!confirm(pkgList + ' <%=translate("is not installed. Install now?")%>')) {
					btn.value = origLabel;
					_testRunning = false;
					_setAllTestBtns(false);
					return;
				}
				btn.value = '<%=translate("Installing...")%>';
				out.value = '<%=translate("Updating package list and installing")%> ' + pkgList + '...';
				var installUrl = '<%=luci.dispatcher.build_url("admin", "network", "eqosplus", "install_deps")%>?pkgs=' + encodeURIComponent(r.missing.join(','));
				XHR.get(installUrl, null, function(x, r2) {
					if (!r2 || !r2.success) {
						out.value = (r2 && r2.output) || '<%=translate("Install failed")%>';
						btn.value = origLabel;
						_testRunning = false;
						_setAllTestBtns(false);
						return;
					}
					doRunTest(btn, out, origLabel, testUrl);
				});
			} else {
				doRunTest(btn, out, origLabel, testUrl);
			}
		});
	}

	// --- Structure test (kmod-dummy) ---
	function runTest() {
		runTestWithDep('btn_test', 'kmod-dummy',
			'<%=luci.dispatcher.build_url("admin", "network", "eqosplus", "run_test")%>');
	}

	// --- Traffic test (ip-full, kmod-veth, netcat) ---
	// netcat (GNU) is required for the conn_limit behavior tests: a real TCP
	// listener inside ns_b + persistent client from ns_a establishes the
	// ESTABLISHED conntrack entry that connlimit-saddr/daddr counts. busybox
	// nc on stripped builds has no listen mode and a SYN+RST flow gets its
	// conntrack entry killed immediately by the kernel — connlimit then
	// always sees count=1 and never matches.
	function runTrafficTest() {
		runTestWithDeps('btn_traffic_test', 'ip-full,kmod-veth,netcat',
			'<%=luci.dispatcher.build_url("admin", "network", "eqosplus", "run_traffic_test")%>');
	}
//]]>
</script>
